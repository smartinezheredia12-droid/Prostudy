services:
  - type: web
    name: prostudy
    runtime: python
    buildCommand: "pip install -r requirements-prod.txt && python manage.py collectstatic --noinput && python manage.py migrate && python manage.py setup_initial_data"
    startCommand: "gunicorn prostudy.wsgi"
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: prostudy-db
          property: connectionString

databases:
  - name: prostudy-db
    databaseName: prostudy
    user: prostudy_user
